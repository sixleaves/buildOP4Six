name: build-x86-64-op-latest
on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

env:
  FIRMWARE_NAME: immortalwrt
  TZ: Asia/Shanghai
  DIY_FILES: files/x86-64/files

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 拉取代码仓库
        uses: actions/checkout@v4

      - name: 2. 获取上游版本信息
        id: get_version
        run: |
          # 尝试获取官方最新 Tag
          TAGS=$(curl -s https://api.github.com/repos/immortalwrt/immortalwrt/tags | jq -r '.[].name')
          LATEST_STABLE=$(echo "$TAGS" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -rV | head -n1)
          
          # 如果获取失败，兜底使用 24.10.4
          if [ -z "$LATEST_STABLE" ]; then
            echo "MAIN_VERSION=24.10.4" >> $GITHUB_ENV
            echo "REPO_BRANCH=openwrt-24.10" >> $GITHUB_ENV
          else
            VERSION_NUM=$(echo $LATEST_STABLE | sed 's/^v//')
            echo "MAIN_VERSION=$VERSION_NUM" >> $GITHUB_ENV
            MAJOR_VER=$(echo $VERSION_NUM | cut -d. -f1-2)
            echo "REPO_BRANCH=openwrt-$MAJOR_VER" >> $GITHUB_ENV
          fi

      - name: 3. 安装编译依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt update
          # 必须安装 zstd，因为新版 IB 通常是 .tar.zst 格式
          sudo apt install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 zstd parted

      - name: 4. 下载官方 ImageBuilder
        run: |
          # 使用 KyaruCloud 镜像源
          BASE_URL="https://immortalwrt.kyarucloud.moe/releases/${{ env.MAIN_VERSION }}/targets/x86/64/"
          
          echo "正在从镜像站获取文件名列表: $BASE_URL"
          
          # 【核心逻辑】不再瞎猜文件名，直接去网页上抓取
          # 1. 下载网页内容
          # 2. 匹配 immortalwrt-imagebuilder 开头，以 .tar.xz 或 .tar.zst 结尾的文件名
          IB_FILENAME=$(curl -s "$BASE_URL" | grep -oE 'immortalwrt-imagebuilder-[^"]+\.tar\.(xz|zst)' | head -n 1)
          
          if [ -z "$IB_FILENAME" ]; then
            echo "Error: 在镜像站找不到 ImageBuilder 文件！"
            echo "请检查版本号 ${{ env.MAIN_VERSION }} 是否存在于 $BASE_URL"
            exit 1
          fi
          
          echo "发现 ImageBuilder 文件: $IB_FILENAME"
          DOWNLOAD_URL="${BASE_URL}${IB_FILENAME}"
          
          echo "Downloading..."
          wget -q "$DOWNLOAD_URL" -O ib.archive
          
          echo "Extracting..."
          # 根据后缀自动选择解压方式
          if [[ "$IB_FILENAME" == *".tar.zst" ]]; then
            tar -I zstd -xf ib.archive
          else
            tar -xf ib.archive
          fi
          
          rm ib.archive
          mv immortalwrt-imagebuilder-* ib_dir

      - name: 5. 注入自动化配置脚本
        run: |
          mkdir -p ib_dir/files/etc/uci-defaults
          
          # --- 脚本1: 99-resize-rootfs (自动扩容) ---
          cat << 'EOF' > ib_dir/files/etc/uci-defaults/99-resize-rootfs
          #!/bin/sh
          disk=$(parted -l 2>/dev/null | grep -o '/dev/sd[a-z]' | head -n 1)
          [ -z "$disk" ] && disk="/dev/mmcblk0"
          [ -z "$disk" ] && exit 0
          part_num=$(parted "$disk" -ms unit s print | tail -n 1 | cut -f 1 -d:)
          parted "$disk" -s resizepart "$part_num" 100%
          resize2fs "${disk}${part_num}" 2>/dev/null || resize2fs "${disk}p${part_num}" 2>/dev/null
          rm -f /etc/uci-defaults/99-resize-rootfs
          reboot
          EOF
          chmod +x ib_dir/files/etc/uci-defaults/99-resize-rootfs
          
          # --- 脚本2: 99-custom-settings (性能优化与网络设置) ---
          cat << 'EOF' > ib_dir/files/etc/uci-defaults/99-custom-settings
          #!/bin/sh
          
          # 1. 开启 BBR 拥塞控制 (提升网络吞吐)
          echo "net.core.default_qdisc=fq" >> /etc/sysctl.conf
          echo "net.ipv4.tcp_congestion_control=bbr" >> /etc/sysctl.conf
          sysctl -p
          
          # 2. 设置默认 LAN IP (防止冲突)
          uci set network.lan.ipaddr='192.168.31.1'
          uci commit network
          
          # 3. 默认开启 TurboACC (如果安装了的话)
          # ImmortalWrt 的 TurboACC 默认通常是开启 Flow Offload 的，这里确保一下
          uci set firewall.@defaults[0].flow_offloading='1'
          uci set firewall.@defaults[0].flow_offloading_hw='1' 2>/dev/null
          uci commit firewall
          
          # 脚本执行完自动删除
          rm -f /etc/uci-defaults/99-custom-settings
          exit 0
          EOF
          chmod +x ib_dir/files/etc/uci-defaults/99-custom-settings

          # 注入你的自定义文件 (如果有)
          if [ -d "${{ env.DIY_FILES }}" ]; then
            cp -r ${{ env.DIY_FILES }}/* ib_dir/files/
          fi

      - name: 6. 开始构建固件
        run: |
          cd ib_dir
          
          # --- 软件包说明 ---
          # 1. luci-app-turboacc: 包含 FullCone NAT 和 Flow Offload 加速
          # 2. kmod-tcp-bbr: BBR 拥塞控制内核模块
          # 3. 驱动大全: 包含 i225/i226/Realtek 等常见网卡驱动
          
          make image PROFILE="generic" FILES="files" ROOTFS_PARTSIZE=1024 PACKAGES="custom-scripts \
          parted resize2fs \
          luci-theme-argon luci-app-package-manager default-settings-chn \
          luci-app-turboacc include-pdnsd-ipv6 \
          kmod-tcp-bbr \
          -dnsmasq dnsmasq-full \
          kmod-nft-offload kmod-nft-tproxy kmod-sched-core kmod-sched-cake \
          kmod-crypto-cbc kmod-crypto-ctr kmod-hwmon-core kmod-i2c-core \
          rsync curl htop \
          kmod-amazon-ena kmod-vmxnet3 kmod-dwmac-intel kmod-forcedeth kmod-r8169 \
          kmod-e1000e kmod-i40e kmod-igb kmod-igbvf \
          kmod-ixgbe kmod-ixgbevf kmod-pcnet32 kmod-tulip \
          kmod-usb-hid kmod-ata-ahci"
          
          echo "FILE_DATE=$(date +"%Y%m%d")" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: 7. 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt_x86_64_firmware
          path: ib_dir/bin/targets/x86/64/*

      - name: 8. 生成 Release 信息
        run: |
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          echo "## ImmortalWrt x86-64 固件发布" >> $GITHUB_ENV
          echo "- **版本**: ${{ env.MAIN_VERSION }}" >> $GITHUB_ENV
          echo "- **构建时间**: ${{ env.BUILD_TIME }}" >> $GITHUB_ENV
          echo "- **镜像源**: kyarucloud.moe" >> $GITHUB_ENV
          echo "### 默认配置" >> $GITHUB_ENV
          echo "- IP: 192.168.31.1" >> $GITHUB_ENV
          echo "- 密码: 无" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 9. 发布 Release
        uses: ncipollo/release-action@v1
        with:
          tag: "${{ env.FIRMWARE_NAME }}-${{ env.MAIN_VERSION }}-${{ env.FILE_DATE }}"
          artifacts: "ib_dir/bin/targets/x86/64/*"
          body: ${{ env.RELEASE_BODY }}
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
