name: build-ib-n1

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    - cron: '0 0 1,16 * *'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-24.10
  REPO_NAME: immortalwrt
  CONFIG_FILE: hanwckf/N1/armv8/N1/.config
  DIY_SCRIPT: hanwckf/N1/armv8/diy/diy.sh
  IB_TAG: IB-N1-latest
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Initialize environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y $(curl -fsSL https://raw.githubusercontent.com/nantayo/My-Pkg/master/openwrt) jq zstd
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown "$USER":"$(id -gn)" /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          git clone "$REPO_URL" -b "$REPO_BRANCH" --single-branch --depth=1 "$REPO_NAME"
          ln -sf "/workdir/$REPO_NAME" "$GITHUB_WORKSPACE/$REPO_NAME"

      - name: Update & Install feeds
        run: |
          test -f "$DIY_SCRIPT"
          chmod +x "$DIY_SCRIPT"
          cd "$REPO_NAME"
          ./scripts/feeds update -a
          "$GITHUB_WORKSPACE/$DIY_SCRIPT"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load N1 custom config
        run: |
          test -f "$CONFIG_FILE"
          cp "$CONFIG_FILE" "$REPO_NAME/.config"
          cd "$REPO_NAME"
          make defconfig

      - name: SSH connect to Actions
        uses: P3TERX/ssh2actions@main
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.ssh == 'true'

      - name: Build OpenWrt & ImageBuilder
        run: |
          cd "$REPO_NAME"
          echo -e "$(nproc) thread compile"
          if make -j"$(nproc)"; then
            echo "Full compile finished."
          else
            echo "Full compile failed, continue to ensure ImageBuilder is generated."
          fi

          if find bin/targets -maxdepth 4 -type f -name '*imagebuilder*.tar.*' | grep -q .; then
            echo "ImageBuilder already generated in full compile."
          else
            echo "ImageBuilder not found, fallback to target/imagebuilder/compile"
            make -j$(( $(nproc) + 1 )) target/imagebuilder/compile V=s
          fi

      - name: Collect ImageBuilder artifact
        run: |
          IB_FILE=$(find "$REPO_NAME/bin/targets" -maxdepth 4 -type f -name '*imagebuilder*.tar.*' | head -n 1)
          if [ -z "$IB_FILE" ]; then
            echo "ImageBuilder artifact not found"
            exit 1
          fi
          echo "IB_FILE=$IB_FILE" >> "$GITHUB_ENV"
          echo "IB_NAME=$(basename "$IB_FILE")" >> "$GITHUB_ENV"
          echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"
          ls -lh "$IB_FILE"

      - name: Upload ImageBuilder artifact
        uses: actions/upload-artifact@v4
        with:
          name: n1-imagebuilder
          path: ${{ env.IB_FILE }}

      - name: Publish ImageBuilder release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.IB_TAG }}
          name: ${{ env.IB_TAG }}
          artifacts: ${{ env.IB_FILE }}
          body: |
            N1 ImageBuilder latest
            - Source branch: ${{ env.REPO_BRANCH }}
            - Build time: ${{ env.FILE_DATE }}
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
